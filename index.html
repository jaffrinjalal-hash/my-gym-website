<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM WEBSITE </title>
    <link rel="stylesheet" href="../CSS/Mini project !/static/style.css">
</head>

<body>
    <header class="header">
        <div class="left">
            <img src="../CSS/Mini project !/static/images/img 1.jpg" alt="Not found">
            <div>MY Fitness Club</div>

        </div>
        <div class="mid">
            <ul class="navbar">
                <li><a href="" class="active">Home</a></li>
                <li><a href="">Blog</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Services</a></li>
            </ul>
        </div>

        <div class="right ">
            <button class="btn">Call us</button>
            <button class="btn">Contact us</button>
        </div>

    </header>
    <section class="container">
        <h1><marquee behavior="" direction="">Join our Fitness goals</marquee></h1>
        <form action="">
            <div class="form-group">
                <input type="text" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <input type="text" placeholder="Enter your Email id">
            </div>
            <div class="form-group">
                <input type="number" placeholder="Enter your number">
            </div>
            <div class="form-group">
                <input type="number" placeholder="Enter your age">
            </div>
            <div class="form-group">
                <input type="text" placeholder="Enter your gender">
            </div>
            <div class="form-group">
                <input type="text" placeholder="Enter your address">
            </div>
            <br>
            <button class="btn" type="submit">Submit</button>


        </form>

    </section>

</body>

</html>
